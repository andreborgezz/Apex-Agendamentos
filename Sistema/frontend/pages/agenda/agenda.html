<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda — Apex Agendamentos</title>
  <meta name="description" content="Calendário completo de agendamentos do seu estabelecimento." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../../styles.css" />
  <script>if(localStorage.getItem('apex_theme')==='dark')document.documentElement.classList.add('dark-theme');</script>
  <style>
    .agenda-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .mes-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mes-label {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      min-width: 160px;
      text-align: center;
    }
    .calendario-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .cal-grid-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
    }
    .cal-day-label {
      padding: 10px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-cell {
      min-height: 90px;
      padding: 8px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: var(--surface-alt); }
    .cal-cell.outro-mes { opacity: 0.35; }
    .cal-cell.hoje .cal-num {
      background: var(--accent);
      color: var(--text-on-accent);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-num {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .cal-evento {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 2px 5px;
      border-radius: var(--r-xs);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-evento--confirmado { background: rgba(52,199,89,0.15); color: var(--success); }
    .cal-evento--pendente   { background: rgba(255,159,10,0.15); color: var(--warning); }

    /* ── SEÇÃO HOJE ───────────────────────────────────────── */
    .hoje-lista { list-style: none; display: flex; flex-direction: column; }

    .hoje-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .hoje-item:last-child { border-bottom: none; }
    .hoje-item:hover { background: var(--surface-alt); }

    .hoje-hora {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 44px;
      flex-shrink: 0;
    }

    .hoje-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent-subtle);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.8125rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hoje-info { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .hoje-nome {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hoje-servico {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hoje-skeleton {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
    }
    .hoje-skeleton:last-child { border-bottom: none; }

    .sk {
      border-radius: var(--r-xs);
      background: linear-gradient(90deg, var(--surface-alt) 25%, #e4e4eb 50%, var(--surface-alt) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .sk-hora   { width: 40px; height: 13px; flex-shrink: 0; }
    .sk-circle { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }
    .sk-info   { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .sk-nome   { height: 13px; width: 36%; }
    .sk-srv    { height: 11px; width: 22%; }

    /* Modal styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-titulo {
      font-size: 1.0625rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <main class="main-content" id="main-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Agenda</h1>
          <p class="page-desc">Calendário de agendamentos</p>
        </div>
        <div class="page-header-actions">
          <div class="agenda-header-row">
            <div class="mes-nav">
              <button id="btn-mes-prev" class="btn btn--ghost btn--sm" aria-label="Mês anterior">
                <i class="ti ti-chevron-left" aria-hidden="true"></i>
              </button>
              <span class="mes-label" id="mes-label"></span>
              <button id="btn-mes-next" class="btn btn--ghost btn--sm" aria-label="Próximo mês">
                <i class="ti ti-chevron-right" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- SEÇÃO HOJE -->
      <section id="hoje-section" class="table-card" style="margin-bottom:20px" aria-label="Agendamentos de hoje">
        <div class="table-card-header">
          <div style="display:flex;align-items:center;gap:10px">
            <h2 class="table-title">Hoje</h2>
            <span id="hoje-badge" class="metric-trend trend--neutral" aria-live="polite"></span>
          </div>
        </div>
        <ul id="hoje-lista" class="hoje-lista" role="list" aria-label="Agendamentos do dia de hoje">
          <li class="hoje-skeleton" aria-hidden="true">
            <div class="sk sk-hora"></div>
            <div class="sk sk-circle"></div>
            <div class="sk-info"><div class="sk sk-nome"></div><div class="sk sk-srv"></div></div>
          </li>
          <li class="hoje-skeleton" aria-hidden="true">
            <div class="sk sk-hora"></div>
            <div class="sk sk-circle"></div>
            <div class="sk-info"><div class="sk sk-nome"></div><div class="sk sk-srv"></div></div>
          </li>
          <li class="hoje-skeleton" aria-hidden="true">
            <div class="sk sk-hora"></div>
            <div class="sk sk-circle"></div>
            <div class="sk-info"><div class="sk sk-nome"></div><div class="sk sk-srv"></div></div>
          </li>
        </ul>
      </section>

      <div class="calendario-wrap" id="calendario-wrap">
        <div class="cal-grid-header">
          <div class="cal-day-label">Dom</div>
          <div class="cal-day-label">Seg</div>
          <div class="cal-day-label">Ter</div>
          <div class="cal-day-label">Qua</div>
          <div class="cal-day-label">Qui</div>
          <div class="cal-day-label">Sex</div>
          <div class="cal-day-label">Sáb</div>
        </div>
        <div class="cal-grid" id="cal-grid">
          <!-- Gerado pelo JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de Detalhes do Dia -->
  <div id="modal-dia" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Detalhes do dia">
    <div class="modal-card" id="modal-dia-card" style="max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; gap: 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:12px;gap:12px">
        <div style="display:flex;flex-direction:column;gap:2px">
          <h2 class="modal-titulo" id="modal-dia-titulo" style="font-size: 1.0625rem;">Agendamentos</h2>
          <button id="btn-bloquear-dia" class="btn btn--ghost btn--sm" style="color:var(--danger);padding:4px 8px;font-size:0.75rem;margin-top:4px;align-self:flex-start">
            <i class="ti ti-lock" aria-hidden="true"></i> Bloquear Dia
          </button>
        </div>
        <button id="btn-fechar-modal-dia" class="btn-icon" aria-label="Fechar modal">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="slots-timeline" id="slots-timeline" style="display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;padding-right:4px">
        <!-- Slots e agendamentos gerados dinamicamente -->
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script type="module" src="agenda.js"></script>
</body>
</html>
