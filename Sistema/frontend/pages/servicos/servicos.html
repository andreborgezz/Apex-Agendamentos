<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviços — Apex Agendamentos</title>
  <meta name="description" content="Gerencie os serviços oferecidos pelo seu estabelecimento." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .servicos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .servico-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .servico-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .servico-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .servico-card-nome { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; color: var(--text-primary); }
    .servico-card-desc { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; }
    .servico-card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); }
    .servico-card-preco { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
    .servico-card-duracao { font-size: 0.8125rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    /* Modal form */
    .modal-overlay { position: fixed; inset: 0; z-index: 8000; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 28px; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px; }
    .modal-titulo { font-size: 1.0625rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  </style>
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <main class="main-content" id="main-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Serviços</h1>
          <p class="page-desc">Gerencie os serviços oferecidos</p>
        </div>
        <div class="page-header-actions">
          <button id="btn-novo-servico" class="btn btn--primary" aria-label="Adicionar novo serviço">
            <i class="ti ti-plus" aria-hidden="true"></i> Novo Serviço
          </button>
        </div>
      </header>

      <div class="servicos-grid" id="servicos-grid">
        <!-- Skeletons -->
        <div class="servico-skeleton" style="height:140px;border-radius:var(--r-lg)"></div>
        <div class="servico-skeleton" style="height:140px;border-radius:var(--r-lg)"></div>
        <div class="servico-skeleton" style="height:140px;border-radius:var(--r-lg)"></div>
      </div>
    </main>
  </div>

  <!-- Modal novo serviço -->
  <div id="modal-servico" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Formulário de novo serviço">
    <div class="modal-card" id="modal-card">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2 class="modal-titulo" id="modal-titulo">Novo Serviço</h2>
        <button id="btn-fechar-modal" class="btn-icon" aria-label="Fechar modal">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="field-group">
        <label class="field-label" for="ms-nome">Nome *</label>
        <input id="ms-nome" class="field-input no-icon" type="text" placeholder="Ex: Corte + Barba" required />
      </div>
      <div class="form-row-2">
        <div class="field-group">
          <label class="field-label" for="ms-preco">Preço (R$)</label>
          <input id="ms-preco" class="field-input no-icon" type="number" placeholder="45,00" min="0" step="0.01" />
        </div>
        <div class="field-group">
          <label class="field-label" for="ms-duracao">Duração (min)</label>
          <input id="ms-duracao" class="field-input no-icon" type="number" placeholder="30" min="5" step="5" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="ms-desc">Descrição</label>
        <textarea id="ms-desc" class="field-input field-textarea" placeholder="Descrição do serviço..." rows="2"></textarea>
      </div>
      <button id="btn-salvar-servico" class="btn btn--primary btn--full">
        <i class="ti ti-check" aria-hidden="true"></i> Salvar Serviço
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script type="module" src="servicos.js"></script>
</body>
</html>
