<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes — Apex Agendamentos</title>
  <meta name="description" content="Base de clientes do seu estabelecimento." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <main class="main-content" id="main-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Clientes</h1>
          <p class="page-desc">Base de clientes cadastrados</p>
        </div>
        <div class="page-header-actions">
          <div class="search-wrap" role="search">
            <i class="ti ti-search search-icon" aria-hidden="true"></i>
            <input id="search-clientes" class="search-input" type="search" placeholder="Buscar cliente..." aria-label="Buscar clientes" />
          </div>
        </div>
      </header>

      <div class="table-card">
        <div class="table-card-header">
          <h2 class="table-title">Todos os Clientes</h2>
          <span class="table-count" id="table-count" aria-live="polite">— clientes</span>
        </div>
        <div class="table-wrapper" role="region" aria-label="Lista de clientes" tabindex="0">
          <table class="apex-table" id="tabela-clientes">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Nome</th>
                <th scope="col">E-mail</th>
                <th scope="col">Telefone</th>
                <th scope="col">Agendamentos</th>
              </tr>
            </thead>
            <tbody id="tbody-clientes">
              <tr class="skeleton-row"><td colspan="5"><div class="skeleton-line"></div></td></tr>
              <tr class="skeleton-row"><td colspan="5"><div class="skeleton-line"></div></td></tr>
              <tr class="skeleton-row"><td colspan="5"><div class="skeleton-line"></div></td></tr>
              <tr class="skeleton-row"><td colspan="5"><div class="skeleton-line"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          <span class="table-count" id="table-count-footer" aria-live="polite"></span>
          <nav class="pagination" id="pagination" aria-label="Paginação"></nav>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script type="module" src="clientes.js"></script>
</body>
</html>
